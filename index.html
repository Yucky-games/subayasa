<body>
  <div class="container">
    <div class="header-area">
      <h1>素早さチェッカー</h1>
      <div class="auth-area">
        <span id="login-message" class="login-msg" style="display:none;">登録した自分のポケモンを保存したままにするにはログインが必要です。</span>
        <span id="user-status" style="display:none;"></span>
        <button id="login-x-btn" onclick="loginWithX()" style="display:none;">Xでログイン</button>
        <button id="logout-btn" onclick="logout()" style="display:none;">ログアウト</button>
      </div>
    </div>
    
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('check')">素早さチェック</button>
      <button class="tab-btn" onclick="switchTab('register')">自分のポケモン登録</button>
    </div>

    <div id="check-tab" class="tab-content active">
      <div class="battle-setup">
        <div class="setup-box mine-setup">
          <h2>自分のポケモン</h2>
          <div class="search-area">
            <input type="text" id="my-search-check" placeholder="名前で検索 (例: ふしぎ)">
            <div id="my-search-results-check" class="search-results"></div>
            
            <p class="or-text">または</p>
            
            <select id="my-registered-select">
              <option value="">登録済みから選ぶ...</option>
            </select>
          </div>
          
          <div class="stats-input" id="my-stats-check" style="display: none;">
            <span id="my-selected-name-check" class="selected-name"></span>
            <div class="inputs-row">
              <input type="number" id="my-points-check" min="0" max="32" value="0"> pt
              <button onclick="document.getElementById('my-points-check').value = 32; updateBattle()">全振り</button>
            </div>
            <div class="checkbox-row">
              <label><input type="checkbox" id="my-nature-check" onchange="updateBattle()"> 性格補正(1.1倍)</label>
              <label><input type="checkbox" id="my-scarf-check" onchange="updateBattle()"> スカーフ</label>
            </div>
            <div id="my-mega-buttons-area" class="mega-buttons"></div>
          </div>
        </div>

        <div class="setup-box opponent-setup">
          <h2>相手のポケモン</h2>
          <div class="search-area">
            <input type="text" id="opp-search" placeholder="名前で検索 (例: りざー)">
            <div id="opp-search-results" class="search-results"></div>
          </div>
          
          <div class="stats-input" id="opp-selected-area" style="display: none;">
            <span id="opp-selected-name" class="selected-name"></span>
            <div id="opp-mega-buttons-area" class="mega-buttons"></div>
          </div>
        </div>
      </div>

      <div id="battle-results" class="battle-results"></div>
    </div>

    <div id="register-tab" class="tab-content">
      <h2>新規登録</h2>
      <input type="text" id="reg-search" placeholder="名前で検索 (例: ふしぎ)">
      <div id="reg-search-results" class="search-results"></div>
      
      <div class="stats-input" id="reg-stats" style="display: none;">
        <span id="reg-selected-name" class="selected-name"></span>
        <div class="inputs-row">
          素早さポイント: <input type="number" id="reg-points" min="0" max="32" value="0">
          <button onclick="document.getElementById('reg-points').value = 32">全振り</button>
        </div>
        <div class="checkbox-row">
          <label><input type="checkbox" id="reg-nature"> 性格補正あり(1.1倍)</label>
          <label><input type="checkbox" id="reg-scarf"> こだわりスカーフ</label>
        </div>
        <button id="reg-save-btn" class="save-btn" onclick="registerMyPokemon()">登録する</button>
      </div>

      <h2>登録済み一覧</h2>
      <ul id="registered-list" class="registered-list" style="list-style: none; padding: 0;"></ul>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
